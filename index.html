<body>

  <script>
    // API基础URL - 自动适配当前域名
    const API_BASE = window.location.origin + '/api';

    // 激活码验证（使用后端API）
    async function checkAuth() {
      const inputCode = document.getElementById("authCode").value.trim();
      const verifyBtn = document.getElementById("verifyBtn");

      if (!inputCode) {
        alert("请输入激活码");
        return;
      }

      // 显示加载状态
      verifyBtn.innerHTML = '<span class="loading"></span>验证中...';
      verifyBtn.disabled = true;

      try {
        const response = await fetch(`${API_BASE}/verify-code`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ code: inputCode })
        });

        const result = await response.json();

        if (result.success) {
          // 验证成功
          alert("激活码验证成功！请填写宝宝信息生成名字～");
          document.getElementById("authArea").classList.add("hidden");
          document.getElementById("mainFunction").classList.remove("hidden");

          // 保存验证状态到本地存储
          localStorage.setItem('verifiedCode', inputCode);
          localStorage.setItem('verifiedAt', new Date().toISOString());
        } else {
          alert(result.message);
        }
      } catch (error) {
        console.error('验证失败:', error);
        alert("网络连接失败，请检查网络后重试");
      } finally {
        // 恢复按钮状态
        verifyBtn.innerHTML = '验证激活码';
        verifyBtn.disabled = false;
      }
    }

    // 页面加载时检查是否已验证
    window.addEventListener('DOMContentLoaded', () => {
      const verifiedCode = localStorage.getItem('verifiedCode');

      if (verifiedCode) {
        // 如果已验证，直接显示主功能区
        document.getElementById("authArea").classList.add("hidden");
        document.getElementById("mainFunction").classList.remove("hidden");
      }

      // 初始化宝宝状态逻辑
      initBabyStatusLogic();
    });

    // ============================================
    // 宝宝状态和生日修改逻辑
    // ============================================

    function initBabyStatusLogic() {
      const babyStatusSelect = document.getElementById('babyStatus');
      const birthDateInput = document.getElementById('birthDate');
      const birthDateTip = document.getElementById('birthDateTip');

      const modifyCount = parseInt(localStorage.getItem('birthDateModifyCount') || '0');
      const currentStatus = localStorage.getItem('babyStatus') || 'born';

      babyStatusSelect.value = currentStatus;
      birthDateInput.value = localStorage.getItem('birthDate') || '';

      updateBirthDateState(currentStatus, modifyCount);

      babyStatusSelect.addEventListener('change', function() {
        const newStatus = this.value;
        localStorage.setItem('babyStatus', newStatus);

        if (newStatus === 'born' && currentStatus === 'unborn') {
          localStorage.setItem('birthDateModifyCount', '0');
          updateBirthDateState(newStatus, 0);
        } else {
          updateBirthDateState(newStatus, modifyCount);
        }
      });

      birthDateInput.addEventListener('change', function() {
        handleBirthDateChange(this.value);
      });
    }

    function handleBirthDateChange(newValue) {
      const babyStatusSelect = document.getElementById('babyStatus');
      const currentStatus = babyStatusSelect.value;
      const birthDateInput = document.getElementById('birthDate');
      const birthDateTip = document.getElementById('birthDateTip');

      if (currentStatus === 'unborn') {
        localStorage.setItem('birthDate', newValue);
        return;
      }

      let modifyCount = parseInt(localStorage.getItem('birthDateModifyCount') || '0');
      const oldBirthDate = localStorage.getItem('birthDate') || '';

      if (newValue === oldBirthDate) {
        return;
      }

      if (!oldBirthDate) {
        localStorage.setItem('birthDate', newValue);
        updateBirthDateState(currentStatus, modifyCount);
        return;
      }

      if (modifyCount >= 1) {
        alert('温馨提示：已出生宝宝的生日仅可修改1次，您已用完修改机会。如需再次修改，请联系客服处理。');
        birthDateInput.value = oldBirthDate;
        return;
      }

      modifyCount++;
      localStorage.setItem('birthDateModifyCount', modifyCount.toString());
      localStorage.setItem('birthDate', newValue);

      updateBirthDateState(currentStatus, modifyCount);

      if (modifyCount >= 1) {
        alert('生日修改成功！已用完1次修改机会，生日输入框将锁定。');
      }
    }

    function updateBirthDateState(babyStatus, modifyCount) {
      const birthDateInput = document.getElementById('birthDate');
      const birthDateTip = document.getElementById('birthDateTip');

      if (babyStatus === 'unborn') {
        birthDateInput.disabled = false;
        birthDateTip.style.display = 'none';
      } else {
        if (modifyCount >= 1) {
          birthDateInput.disabled = true;
          birthDateTip.style.display = 'block';
          birthDateTip.textContent = '⚠️ 已用完1次修改机会，生日已锁定';
          birthDateTip.style.color = '#ff2442';
        } else {
          birthDateInput.disabled = false;
          birthDateTip.style.display = 'block';
          birthDateTip.textContent = '✓ 已出生宝宝可修改1次生日';
          birthDateTip.style.color = '#999';
        }
      }
    }

          { name: "梓睿", source: "《论语》", meaning: "梓木成材，睿智过人；如良木般成才，智慧超群。" },
          { name: "皓然", source: "《孟子》", meaning: "皓月当空，浩然正气；光明磊落，正直无私。" },
          { name: "瑞轩", source: "《楚辞·九歌》", meaning: "祥瑞之气，气宇轩昂；天赐福气，气度不凡。" },
          { name: "沛然", source: "《孟子》", meaning: "沛然从之，气度不凡；气势充沛，从容不迫。" },
          { name: "博远", source: "《论语》", meaning: "博学多才，志向远大；学识渊博，眼界开阔。" },
          { name: "文昊", source: "《楚辞》", meaning: "文采飞扬，昊天罔极；才华横溢，前途光明。" }
        ]
      }
    };

    let favorites = [];

    function generateNames() {
      const surname = document.getElementById("surname").value.trim();
      const birthDate = document.getElementById("birthDate").value;
      const gender = document.getElementById("gender").value;
      const style = document.getElementById("style").value;

      if (!surname) {
        alert("请输入宝宝姓氏");
        return;
      }

      if (!birthDate) {
        alert("请选择出生日期");
        return;
      }

      // 获取对应风格和性别的名字库
      const nameList = nameDatabase[gender][style];
      const namesToShow = nameList.slice(0, 50); // 先显示50个，可根据需要调整

      // 生成名字卡片
      const nameListEl = document.getElementById("nameList");
      nameListEl.innerHTML = "";

      namesToShow.forEach((nameData, index) => {
        const fullName = surname + nameData.name;
        const score = Math.floor(Math.random() * 10) + 90; // 90-99分

        const card = document.createElement("div");
        card.className = "name-card";
        card.innerHTML = `
          <button class="collect-btn" onclick="addToFavorites('${fullName}', '${nameData.meaning}')">♡</button>
          <div class="card-header">
            <span class="name-text">${fullName}</span>
            <span class="score-tag">${score}分</span>
          </div>
          <span class="source-tag">${nameData.source}</span>
          <div class="meaning-area">
            <p class="meaning-text">${nameData.meaning}</p>
          </div>
        `;
        nameListEl.appendChild(card);
      });

      // 显示结果区域
      document.getElementById("resultArea").style.display = "block";

      // 如果有收藏，显示收藏区
      if (favorites.length > 0) {
        document.getElementById("favoritesArea").classList.add("show");
        updateFavoritesList();
      }
    }

    function addToFavorites(name, meaning) {
      // 检查是否已经收藏
      if (favorites.some(f => f.name === name)) {
        alert("这个名字已经收藏过了");
        return;
      }

      favorites.push({ name, meaning });
      updateFavoritesList();

      // 更新收藏按钮状态
      event.target.classList.add("collected");
      event.target.textContent = "♥";
    }

    function updateFavoritesList() {
      const favoritesListEl = document.getElementById("favoritesList");
      const favoritesCountEl = document.getElementById("favoritesCount");
      const favoritesArea = document.getElementById("favoritesArea");

      favoritesCountEl.textContent = `已收藏 ${favorites.length} 个名字`;

      if (favorites.length === 0) {
        favoritesListEl.innerHTML = '<div class="empty-favorites">暂无收藏的名字</div>';
        favoritesArea.classList.remove("show");
        return;
      }

      favoritesArea.classList.add("show");
      favoritesListEl.innerHTML = "";

      favorites.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "name-card";
        card.innerHTML = `
          <button class="delete-btn" onclick="removeFromFavorites(${index})">删除</button>
          <div class="card-header">
            <span class="name-text">${item.name}</span>
          </div>
          <div class="meaning-area">
            <p class="meaning-text">${item.meaning}</p>
          </div>
        `;
        favoritesListEl.appendChild(card);
      });
    }

    function removeFromFavorites(index) {
      favorites.splice(index, 1);
      updateFavoritesList();
    }
  </script>
</body>
</html>
